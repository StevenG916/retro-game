<!DOCTYPE html>
<html th:with="version='@project.version@',
        settings=${@userService.currentUserSettings},
        skin=${settings.skin},
        locale=${@userService.currentUserLocaleIfAuthenticated.orElse(T(java.util.Locale).default)}"
      th:lang="${locale.language}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Retro Game</title>
  <link th:href="@{/static/skins/{skin}/style.css?{v}(skin=${skin},v=${version})}" rel="stylesheet">
  <script th:src="@{/static/js/jquery-3.5.1.min.js}"></script>
  <script th:src="@{/static/js/popper-1.16.1.min.js}"></script>
  <script th:src="@{/static/js/tooltip-1.3.3.min.js}"></script>
  <script th:src="@{/static/js/retrogame.js?{v}(v=${version})}"></script>
</head>
<!-- The data-* config values come from GameConfigModelAdvice rather than an
     inline @environment lookup: Thymeleaf 3.1 evaluates this element's
     attributes in a restricted context that forbids bean access. -->
<body th:data-production-speed="${productionSpeed}"
      th:data-fleet-speed="${fleetSpeed}"
      th:data-metal-mine-base-production="${metalMineBaseProduction}"
      th:data-crystal-mine-base-production="${crystalMineBaseProduction}"
      th:data-deuterium-synthesizer-base-production="${deuteriumSynthesizerBaseProduction}"
      th:data-metal-mine-base-energy-usage="${metalMineBaseEnergyUsage}"
      th:data-crystal-mine-base-energy-usage="${crystalMineBaseEnergyUsage}"
      th:data-deuterium-synthesizer-base-energy-usage="${deuteriumSynthesizerBaseEnergyUsage}"
      th:data-solar-plant-base-energy-production="${solarPlantBaseEnergyProduction}"
      th:data-fusion-reactor-base-energy-production="${fusionReactorBaseEnergyProduction}"
      th:data-fusion-reactor-base-deuterium-usage="${fusionReactorBaseDeuteriumUsage}"
      th:data-fields-per-terraformer-level="${fieldsPerTerraformerLevel}"
      th:data-fields-per-lunar-base-level="${fieldsPerLunarBaseLevel}"
      th:data-storage-capacity-multiplier="${storageCapacityMultiplier}"
      th:data-number-input-scrolling="${settings.numberInputScrollingEnabled}">
<div class="container">
  <div>
    <div>
      <table th:replace="~{top-bar :: top-bar}"></table>
      <div layout:fragment="content"></div>
    </div>
  </div>
  <nav th:replace="~{menu :: menu}"></nav>
</div>
</body>
</html>
